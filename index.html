<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#101828">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="Orari e coincidenze bus da e verso Busto Garolfo.">
  <title>Trasporti LIVE Busto Garolfo</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div>
        <!-- <p class="app-kicker">Via ...</p> -->
        <h1>Trasporti Busto Garolfo</h1>
      </div>
      <div class="clock-card" aria-live="polite">
        <span id="clock-time">--:--</span>
        <small id="clock-date">--</small>
      </div>
    </header>

    <nav class="tab-bar" aria-label="Sezioni principali">
      <button class="tab-btn active" type="button" data-tab="live">LIVE</button>
      <button class="tab-btn" type="button" data-tab="timetable">Orari</button>
      <button class="tab-btn" type="button" data-tab="settings">Impostazioni</button>
    </nav>

    <main class="content-area">
      <section id="tab-live" class="tab-panel active" aria-label="LIVE">
        <div id="live-content" class="stack">
          <div class="empty-state">Caricamento...</div>
        </div>
      </section>

      <section id="tab-timetable" class="tab-panel" aria-label="Orari">
        <div id="timetable-content" class="stack">
          <div class="empty-state">Seleziona una linea</div>
        </div>
      </section>

      <section id="tab-settings" class="tab-panel" aria-label="Impostazioni">
        <div id="settings-content" class="stack"></div>
      </section>
    </main>
    
    <!-- Mappa Floating Button -->
    <button class="map-fab" id="map-fab" type="button" aria-label="Apri mappa delle fermate">
      🗺️ <span>Mappa</span>
    </button>

    <!-- Overlay Mappa -->
    <div class="map-overlay" id="map-overlay" aria-hidden="true">
      <div class="map-header">
        <div>
          <h2>Mappa Fermate</h2>
        </div>
        <button type="button" id="map-close" aria-label="Chiudi mappa">✕</button>
      </div>
      <div id="map-container"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script type="module" src="./js/main.js"></script>
</body>
</html>
